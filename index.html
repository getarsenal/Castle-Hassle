  <style>
    :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2433; }
    body { font-family: 'EB Garamond', Georgia, serif; color: #fff; touch-action: none; user-select: none; -webkit-user-select: none; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    /* ---- HUD (clean vertical stacks: nothing overlaps) ---- */
    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    #title { display: none; }

    /* perf readout (fps / ms / unit count) — for device testing; tap to hide */
    #perf {
      position: absolute; top: calc(var(--safe-top) + 12px); left: 10px;
      font: 600 11px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #b6f3c0; background: rgba(12,18,28,0.6); border-radius: 7px;
      padding: 4px 7px; pointer-events: auto; letter-spacing: 0.2px;
      -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
    }
    #perf.hidden { display: none; }

    #topbar {
      position: absolute; top: calc(var(--safe-top) + 10px); left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
      background: rgba(20,28,42,0.82); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 8px 14px; pointer-events: auto;
      font-size: 13px; font-weight: 600; letter-spacing: 0.3px; white-space: nowrap;
    }
    #topbar .stat { display: flex; gap: 6px; align-items: center; }
    #topbar .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.att { background: #e8513a; } .dot.def { background: #3d7be0; }

    /* Begin button: directly under the topbar, deploy only */
    #startbar { position: absolute; top: calc(var(--safe-top) + 54px); left: 50%; transform: translateX(-50%); pointer-events: auto; }
    #keepBar { position: absolute; top: calc(var(--safe-top) + 52px); left: 50%; transform: translateX(-50%);
      width: min(72vw, 300px); display: none; text-align: center; }
    #keepBar.show { display: block; }
    #keepLabel { font: 700 11px 'EB Garamond', Georgia, serif; letter-spacing: 1.5px; color: #ffe1a0;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8); margin-bottom: 4px; }
    #keepTrack { height: 9px; border-radius: 6px; background: rgba(10,8,6,0.72);
      border: 1px solid rgba(255,255,255,0.18); overflow: hidden; }
    #keepFill { height: 100%; width: 0%; border-radius: 6px;
      background: linear-gradient(90deg, #e8b53a, #c43d34); transition: width 0.12s linear; }
    #startbtn { font: inherit; font-weight: 800; font-size: 15px; color: #1a2433; background: #ffd24a; border: none; border-radius: 12px; padding: 10px 22px; box-shadow: 0 4px 0 #c79a20; cursor: pointer; }
    #startbtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #c79a20; }

    /* bottom controls stack: cards → tools → hint (above them) */
    #cards {
      position: absolute; bottom: calc(var(--safe-bottom) + 10px); left: 0; right: 0;
      display: flex; gap: 8px; pointer-events: auto; flex-wrap: nowrap; overflow-x: auto;
      justify-content: safe center; padding: 2px 12px; scrollbar-width: none;
    }
    #cards::-webkit-scrollbar { display: none; }
    .card {
      flex: 0 0 auto; min-width: 72px; padding: 7px 9px 8px; border-radius: 12px;
      background: rgba(20,28,42,0.88); border: 2px solid rgba(255,255,255,0.14);
      text-align: center; cursor: pointer; transition: transform .08s, border-color .08s;
    }
    .card:active { transform: scale(0.95); }
    .card.sel { border-color: #ffd24a; box-shadow: 0 0 0 1px #ffd24a inset; }
    .card .name { font-size: 11px; font-weight: 700; }
    .card .count { font-size: 16px; font-weight: 800; margin-top: 2px; }
    .card .bar { height: 4px; border-radius: 2px; margin-top: 5px; background: rgba(255,255,255,0.15); overflow: hidden; }
    .card .bar > i { display: block; height: 100%; background: #5fd16a; }
    .card .ammo { height: 3px; border-radius: 2px; margin-top: 3px; background: rgba(255,255,255,0.12); overflow: hidden; }
    .card .ammo > i { display: block; height: 100%; background: #6fc3e8; }
    .card.routing { opacity: 0.55; }
    .card.routing .name::after { content: " ⚑"; color: #ffb03a; }

    #tools { position: absolute; bottom: calc(var(--safe-bottom) + 96px); left: 50%; transform: translateX(-50%); display: none; gap: 8px; pointer-events: auto; }
    #tools.show { display: flex; }
    .tool { font: inherit; font-size: 12px; font-weight: 700; color: #fff; background: rgba(20,28,42,0.92); border: 2px solid rgba(255,255,255,0.18); border-radius: 10px; padding: 7px 12px; cursor: pointer; }
    .tool.on { border-color: #ffe27a; color: #ffe27a; }

    #hint {
      position: absolute; bottom: calc(var(--safe-bottom) + 134px); left: 50%; transform: translateX(-50%);
      font-size: 12px; color: rgba(255,255,255,0.82); background: rgba(20,28,42,0.6);
      padding: 5px 14px; border-radius: 10px; pointer-events: none; text-align: center; max-width: 88vw;
    }

    #banner {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px; pointer-events: auto; background: rgba(10,14,22,0.55); z-index: 20;
    }
    #banner.show { display: flex; }
    #banner h1 { font-size: 40px; font-weight: 800; letter-spacing: 1px; text-shadow: 0 3px 14px rgba(0,0,0,.5); }
    #banner p { font-size: 15px; color: rgba(255,255,255,0.85); max-width: 320px; text-align: center; }
    #banner button, #startbtn { pointer-events: auto; }
    #restartbtn { font: inherit; font-weight: 700; font-size: 16px; color: #1a2433; background: #ffd24a; border: none; border-radius: 12px; padding: 12px 26px; cursor: pointer; box-shadow: 0 4px 0 #c79a20; }
    #restartbtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #c79a20; }
    .hidden { display: none !important; }
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #1a2433; z-index: 50; font-weight: 700; letter-spacing: 1px; color: #ffd24a; }

    /* ---- muster screen (medieval theme) ---- */
    /* ---- studio splash / title / world map ---- */
    #intro, #titleScreen, #map { position: fixed; inset: 0; z-index: 50; display: none; }
    #intro.show, #titleScreen.show { display: flex; }
    #map.show { display: block; }
    #intro { align-items: center; justify-content: center; background: #0b0f17; animation: fadein 0.8s ease; }
    #introVideo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    #introCard { text-align: center; animation: fadein 1.2s ease; }
    #introHint { position: absolute; bottom: calc(var(--safe-bottom) + 28px); left: 0; right: 0; text-align: center;
      color: rgba(255,255,255,0.85); font: 600 15px 'EB Garamond', Georgia, serif; letter-spacing: 1px; pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7); animation: pulseHint 1.3s ease-in-out infinite; }
    @keyframes pulseHint { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
    #introMark { font: 800 42px 'EB Garamond', Georgia, serif; letter-spacing: 8px; color: #e9d9b6; }
    #introSub { font: 600 18px 'EB Garamond', Georgia, serif; letter-spacing: 12px; color: #9fb0c4; margin-top: 6px; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

    #titleScreen { flex-direction: column; align-items: center; justify-content: space-between;
      padding: 9vh 16px calc(var(--safe-bottom) + 7vh);
      background: radial-gradient(120% 80% at 50% 18%, #2a3b54, #0e1622 70%); animation: fadein 0.6s ease; }
    #titleIcon { width: min(86vw, 480px); height: auto; border-radius: 14%; box-shadow: 0 16px 50px rgba(0,0,0,0.65); margin-top: 4vh; }
    #startGameBtn { pointer-events: auto; border: none; cursor: pointer; width: min(86vw, 480px);
      font: 800 24px 'EB Garamond', Georgia, serif; letter-spacing: 1px; color: #3a2a08; background: linear-gradient(#ffd86b, #e9a72c);
      padding: 18px 0; border-radius: 16px; box-shadow: 0 6px 0 #b9851c; }
    #startGameBtn:active { transform: translateY(2px); box-shadow: 0 4px 0 #b9851c; }

    #map { background: #cfe3f2; }
    #mapCanvas { width: 100%; height: 100%; display: block; touch-action: none; }
    #mapHeader { position: absolute; top: calc(var(--safe-top) + 12px); left: 50%; transform: translateX(-50%);
      background: rgba(20,28,42,0.82); color: #fff; font: 700 14px 'EB Garamond', Georgia, serif; letter-spacing: 1px;
      padding: 8px 16px; border-radius: 12px; pointer-events: none; white-space: nowrap; }
    #warCouncilBtn { position: absolute; left: 14px; bottom: calc(var(--safe-bottom) + 16px); z-index: 6;
      border: 1px solid #7a5e2e; background: linear-gradient(#2c2110ee,#161008ee); color: #ffe6a6;
      font: 700 14px 'EB Garamond', Georgia, serif; padding: 10px 15px; border-radius: 11px; cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,.45); }
    #warCouncilBtn #wcGold { color: #ffd24a; margin-left: 7px; font-weight: 700; }
    #musterBack { position: absolute; top: calc(var(--safe-top) + 16px); left: 14px; z-index: 2;
      pointer-events: auto; border: 1px solid rgba(255,255,255,0.2); background: rgba(20,28,42,0.7); color: #e9d9b6;
      font: 700 13px 'EB Garamond', Georgia, serif; padding: 8px 14px; border-radius: 10px; cursor: pointer; }

    #muster {
      position: fixed; inset: 0; z-index: 40; display: none; flex-direction: column; align-items: center;
      padding: calc(var(--safe-top) + 26px) 16px calc(var(--safe-bottom) + 20px); overflow-y: auto;
      background:
        radial-gradient(120% 60% at 50% -10%, rgba(255,210,120,0.18), transparent 60%),
        linear-gradient(180deg, #141d2b 0%, #1d2942 42%, #3a3326 100%);
    }
    #muster.show { display: flex; }
    #muster::after { /* crenellated castle silhouette at the bottom */
      content: ''; position: fixed; left: 0; right: 0; bottom: 0; height: 120px; pointer-events: none;
      background:
        repeating-linear-gradient(90deg, #0e1622 0 26px, transparent 26px 40px) top/auto 16px no-repeat,
        linear-gradient(#0e1622, #0e1622) 0 16px / 100% 104px no-repeat;
      opacity: 0.55;
    }
    #muster h1 { font-size: 27px; font-weight: 800; color: #ffd24a; letter-spacing: 1.5px; text-shadow: 0 3px 16px rgba(0,0,0,.5); }
    #muster .sub { font-size: 12.5px; color: rgba(255,255,255,0.66); margin: 4px 0 18px; }
    #budgetWrap { width: 100%; max-width: 440px; z-index: 1; }
    #budgetLine { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #ffe6b0; }
    #budgetBar { height: 10px; border-radius: 6px; background: rgba(0,0,0,0.35); overflow: hidden; margin-bottom: 18px; border: 1px solid rgba(255,255,255,0.1); }
    #budgetBar > i { display: block; height: 100%; background: linear-gradient(90deg,#ffd24a,#ffb03a); transition: width .12s; }
    #budgetBar.over > i { background: linear-gradient(90deg,#e8513a,#c0392b); }
    #rosterRows { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 10px; z-index: 1; }
    .rrow {
      display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 14px;
      background: linear-gradient(180deg, rgba(56,72,100,0.55), rgba(30,41,66,0.7));
      border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }
    .rrow .ic { width: 42px; height: 42px; flex: 0 0 auto; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 23px; background: radial-gradient(circle at 35% 30%, #4a5f86, #283a5c); border: 1px solid rgba(255,255,255,0.14); }
    .rrow .info { flex: 1; min-width: 0; }
    .rrow .nm { font-size: 14.5px; font-weight: 800; }
    .rrow .dsc { font-size: 10.5px; color: rgba(255,255,255,0.58); }
    .rrow .ct { font-size: 19px; font-weight: 800; min-width: 50px; text-align: center; color: #ffe6b0; }
    .rbtn { width: 40px; height: 40px; border-radius: 11px; border: none; font: inherit; font-size: 22px; font-weight: 800; color: #1a2433; background: linear-gradient(180deg,#ffe27a,#ffc23a); box-shadow: 0 3px 0 #c79a20; cursor: pointer; }

<body>
  <div id="app"></div>
  <div id="loading">RAISING THE BANNERS…</div>
  <script>
    // Startup diagnostics: if the game module fails to load or throws during
    // init, surface the reason on screen instead of an eternal loading screen.
    (function () {
      function box() {
        var l = document.getElementById('loading');
        if (!l) {
          l = document.createElement('div');
          l.id = 'loading';
          document.body.appendChild(l);
        }
        l.style.whiteSpace = 'pre-wrap';
        l.style.padding = '26px';
        l.style.fontSize = '12px';
        l.style.lineHeight = '1.5';
        l.style.textAlign = 'left';
        l.style.color = '#ff9a6a';
        l.style.fontFamily = 'monospace';
        return l;
      }
      function show(msg) { box().textContent = msg; }
      window.addEventListener('error', function (e) {
        // resource (script/img) load failures have no e.message
        if (e && e.target && e.target.src) { show('FAILED TO LOAD:\n' + e.target.src + '\n\nThe JS bundle did not load — the build output (www/index.html) was not deployed; this looks like the un-built dev file.'); return; }
        show('STARTUP ERROR:\n' + (e.message || e.type) + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '\n\n' + ((e.error && e.error.stack) || ''));
      }, true);
      window.addEventListener('unhandledrejection', function (e) {
        show('STARTUP REJECTION:\n' + ((e.reason && (e.reason.stack || e.reason.message)) || e.reason));
      });
      setTimeout(function () {
        if (window.__running) return; // game is live, all good
        if (!window.__started) show('Game did not start within 9s.\nThe JS bundle never executed (this is likely the un-built dev index.html — deploy the built file instead).');
        else show('Init did not finish within 9s.\nThe script loaded but setup hung — likely WebGL is unavailable/slow in this browser, or an error was swallowed.');
      }, 9000);
    })();
  </script>
  <div id="hud">
    <div id="title">CASTLE HASSLE</div>
    <div id="perf" title="Tap to hide">– fps</div>
    <div id="topbar">
      <span class="stat"><span class="dot att"></span><span id="attCount">0</span></span>
      <span style="opacity:.4">vs</span>
      <span class="stat"><span class="dot def"></span><span id="defCount">0</span></span>
      <span style="opacity:.4; margin-left:6px;" id="phase">DEPLOY</span>
    </div>
    <div id="startbar"><button id="startbtn">Begin Assault</button></div>
    <div id="keepBar"><div id="keepLabel">HOLD THE KEEP</div><div id="keepTrack"><div id="keepFill"></div></div></div>
    <div id="hint">Tap a unit card, then tap the field to send them. Drag to pan, pinch to zoom.</div>
    <div id="tools"></div>
    <div id="cards"></div>
    <div id="banner"><h1 id="bannerTitle"></h1><p id="bannerText"></p><button id="restartbtn">Fight Again</button></div>
  </div>
  <div id="muster">
    <button id="musterBack">◂ Map</button>
    <h1>MUSTER YOUR ARMY</h1>
    <div class="sub" id="musterTitle">Spend your muster points — then deploy and lay siege.</div>
    <div id="budgetWrap">
      <div id="budgetLine"><span>Muster points</span><span><b id="ptsUsed">0</b> / <span id="ptsMax">1600</span></span></div>
      <div id="budgetBar"><i></i></div>
    </div>
    <div id="rosterRows"></div>
    <button id="musterBtn">Muster &amp; Deploy</button>
  </div>

  <!-- Studio splash → title → world map -->
  <div id="intro">
    <video id="introVideo" playsinline preload="auto" style="display:none"></video>
    <div id="introCard">
      <div id="introMark">SCHEIDEL</div>
      <div id="introSub">INTERACTIVE</div>
    </div>
    <div id="introHint">tap for sound</div>
  </div>

  <div id="titleScreen">
    <img id="titleIcon" src="https://getarsenal.app/Castle-Hassle/icon.png" alt="Castle Hassle" />
    <button id="startGameBtn">Start Game</button>
  </div>

  <div id="map">
    <canvas id="mapCanvas"></canvas>
    <div id="mapHeader">CHOOSE YOUR NEXT SIEGE</div>
    <button id="warCouncilBtn">War Council<span id="wcGold"></span></button>
  </div>
